name: Release crate

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create GitHub Release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-crate-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version_name: ${{ steps.meta.outputs.version_name }}
      tag: ${{ steps.meta.outputs.tag }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: Swatinem/rust-cache@v2

      - name: Set version/tag metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            COMMIT_SHA="$(git rev-parse HEAD)"
          else
            OLD_VERSION=$(grep -m1 '^version\s*=\s*"' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
            IFS='.' read -r MAJ MIN PAT <<<"$OLD_VERSION"
            VERSION="$MAJ.$MIN.$((PAT+1))"

            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"

            sed -i -E "0,/^version\s*=.*/s//version = \"$VERSION\"/" Cargo.toml
            cargo update -w
            git add Cargo.toml Cargo.lock
            git commit -m "chore: bump to v$VERSION [skip ci]" || true
            git push

            TAG="v$VERSION"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            COMMIT_SHA="$(git rev-parse HEAD)"
          fi

          echo "version_name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches Cargo.toml version
        run: |
          VERSION=$(grep -m1 '^version\s*=\s*"' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "v$VERSION" != "${{ steps.meta.outputs.tag }}" ]; then
            echo "Version mismatch: tag ${{ steps.meta.outputs.tag }} != Cargo.toml v$VERSION"
            exit 1
          fi

  publish:
    name: Publish to crates.io
    needs: prepare-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-version.outputs.commit_sha }}

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig-dev

      - name: Read package metadata
        id: meta
        run: |
          NAME=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].name')
          VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].version')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cargo package (dry-run archive)
        id: pkg
        run: |
          set -euxo pipefail
          cargo package --locked
          NAME="${{ steps.meta.outputs.name }}"
          VER="${{ steps.meta.outputs.version }}"
          CRATE_FILENAME="${NAME}-${VER}.crate"
          CRATE="target/package/$CRATE_FILENAME"
          test -f "$CRATE"
          echo "crate_filename=$CRATE_FILENAME" >> "$GITHUB_OUTPUT"

      - name: Upload crate artifact
        uses: actions/upload-artifact@v7
        with:
          name: crate
          path: target/package/*.crate
          if-no-files-found: error
          retention-days: 1

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for i in 1 2 3; do
            if cargo publish --locked; then
              exit 0
            fi
            if cargo metadata --no-deps --format-version=1 2>/dev/null | \
               jq -e --arg ver "${{ steps.meta.outputs.version }}" \
               '.packages[0].version == $ver' > /dev/null 2>&1; then
              echo "Version ${{ steps.meta.outputs.version }} is already published; treating as success."
              exit 0
            fi
            echo "Publish failed, retrying in $((i*10))s..." >&2
            sleep $((i*10))
          done
          echo "Publish failed after 3 attempts"
          exit 1

  release:
    name: Create GitHub Release
    needs:
      - prepare-version
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download crate artifact
        uses: actions/download-artifact@v7
        with:
          name: crate
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.crate > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create/Update Release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.create_release == true) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-version.outputs.tag }}
          name: ${{ needs.prepare-version.outputs.tag }}
          generate_release_notes: true
          target_commitish: ${{ needs.prepare-version.outputs.commit_sha }}
          files: |
            dist/*.crate
            dist/SHA256SUMS.txt
